name: LoC badges

on:
  push:
    branches:
      - master
  schedule:
    # Daily at 04:00 UTC — keeps badges fresh even on quiet days.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: loc-badge
  cancel-in-progress: true

jobs:
  loc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout master
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: master
          fetch-depth: 1

      - name: Prepare output dir
        run: mkdir -p output

      - name: LoC-total
        uses: alexispurslane/GHA-LoC-Badge@811a7fa2bae9860e8f254bcb9cfb71d021931a77 # v2.0.0
        with:
          debug: true
          directory: ./
          badge: ./output/loc.svg
          badge_label: "LoC"
          badge_color: "green"
          patterns: "src/**|static/src/**|shared/**"
          ignore: "*.js|*.jsx|*.mjs|*.cjs|*.min.js"
      - name: LoC-backend
        uses: alexispurslane/GHA-LoC-Badge@811a7fa2bae9860e8f254bcb9cfb71d021931a77 # v2.0.0
        with:
          debug: true
          directory: ./
          badge: ./output/loc-backend.svg
          badge_label: "LoC (backend)"
          badge_color: "green"
          patterns: "src/**"
          ignore: "*.js|*.jsx|*.mjs|*.cjs|*.min.js"

      - name: LoC-frontend
        uses: alexispurslane/GHA-LoC-Badge@811a7fa2bae9860e8f254bcb9cfb71d021931a77 # v2.0.0
        with:
          debug: true
          directory: ./
          badge: ./output/loc-frontend.svg
          badge_label: "LoC (frontend)"
          badge_color: "green"
          patterns: "static/src/**"
          ignore: "*.js|*.jsx|*.mjs|*.cjs|*.min.js"

      - name: LoC-common
        uses: alexispurslane/GHA-LoC-Badge@811a7fa2bae9860e8f254bcb9cfb71d021931a77 # v2.0.0
        with:
          debug: true
          directory: ./
          badge: ./output/loc-frontend.svg
          badge_label: "LoC (shared)"
          badge_color: "green"
          patterns: "shared/**"
          ignore: "*.js|*.jsx|*.mjs|*.cjs|*.min.js"

      - name: Publish badges to `badges` branch
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash badge SVGs outside the worktree so the orphan reset
          # below doesn't wipe them.
          TMP=$(mktemp -d)
          
          cp output/loc.svg  "$TMP/"
          cp output/loc-backend.svg  "$TMP/"
          cp output/loc-frontend.svg  "$TMP/"
          cp output/loc-shared.svg  "$TMP/"

          git checkout --orphan badges
          git rm -rf --quiet . || true
          git clean -fdx -e output
          
          mv "$TMP/loc.svg"  ./loc.svg

          git add loc.svg loc-backend.svg loc-frontend.svg loc-shared.svg
          if git diff --cached --quiet; then
            echo "No badge changes — nothing to publish."
            exit 0
          fi

          git commit -m "chore(badges): refresh LoC badges"
          git push -f origin badges
